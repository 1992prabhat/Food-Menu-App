{% extends 'food/base.html' %}

{% block body %}

<div class="min-h-screen flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-2xl bg-white shadow-xl rounded-3xl overflow-hidden">

        <!-- Header -->
        <div class="bg-lime-600 text-white text-center py-6">
            <h1 class="text-3xl font-bold">🍔 Add Food Item</h1>
            <p class="text-lime-100 mt-2">
                Add a new delicious item to your menu
            </p>
        </div>

        <!-- Form -->
        <div class="p-8">

            <form method="POST" enctype="multipart/form-data" class="space-y-6">
                {% csrf_token %}

                {% for field in form %}
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% if field.errors %}
                    <p class="text-red-500 text-sm mt-1">
                        {{ field.errors|striptags }}
                    </p>
                    {% endif %}
                </div>
                {% endfor %}

                <!-- Buttons -->
                <div class="flex gap-4 pt-4">

                    <button
                        type="submit"
                        class="flex-1 bg-lime-600 hover:bg-lime-700 text-white font-semibold py-3 rounded-xl shadow-md transition duration-300">
                        Add Food
                    </button>

                    <a href="{% url 'food:index' %}"
                       class="flex-1 text-center border border-lime-600 text-lime-600 hover:bg-lime-50 font-semibold py-3 rounded-xl transition duration-300">
                        Cancel
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
