{% extends 'food/base.html' %}

{% block body %}

<div class="min-h-[70vh] flex items-center justify-center px-4">

    <div class="max-w-xl text-center">

        <div class="text-8xl mb-4">🍔</div>

        <h1 class="text-6xl font-extrabold text-lime-600 mb-4">
            404
        </h1>

        <h2 class="text-3xl font-bold text-gray-800 mb-4">
            Food Item Not Found
        </h2>

        <p class="text-gray-600 text-lg mb-8">
            Sorry, the food item you're looking for doesn't exist or may have been removed.
        </p>

        <div class="flex justify-center gap-4">

            <a href="{% url 'home' %}"
               class="bg-lime-600 hover:bg-lime-700 text-white px-6 py-3 rounded-xl font-semibold transition">
                🍽️ Back to Menu
            </a>

            <a href="{% url 'food:add_food' %}"
               class="border border-lime-600 text-lime-600 hover:bg-lime-50 px-6 py-3 rounded-xl font-semibold transition">
                ➕ Add Food
            </a>

        </div>

    </div>

</div>

{% endblock %}
