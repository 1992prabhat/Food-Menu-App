{% extends 'food/base.html' %}

{% block hero %}
{% endblock %}

{% block body %}

<div class="container mx-auto px-4 py-16">

```
<div class="max-w-lg mx-auto bg-white rounded-3xl shadow-xl p-8 text-center">

    <div class="text-6xl mb-4">
        🗑️
    </div>

    <h1 class="text-3xl font-bold text-gray-800 mb-4">
        Delete Food Item
    </h1>

    <p class="text-gray-600 mb-8">
        Are you sure you want to delete
        <span class="font-semibold text-red-600">
            "{{ object.item_name }}"
        </span>?
    </p>

    <form method="POST">
        {% csrf_token %}

        <div class="flex justify-center gap-4">

            <a href="{% url 'food:detail' object.id %}"
               class="px-6 py-3 border border-gray-300 rounded-xl hover:bg-gray-100 transition">
                Cancel
            </a>

            <button
                type="submit"
                class="px-6 py-3 bg-red-600 text-white rounded-xl hover:bg-red-700 transition">
                Delete
            </button>

        </div>

    </form>

</div>
```
