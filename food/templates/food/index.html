{% extends 'food/base.html' %}
{% load static %}

{% block body %}
<div class="min-h-screen bg-gradient-to-br from-lime-50 to-green-100 py-10">
  <div class="container mx-auto px-4">

    <!-- Header -->
    <div class="text-center mb-12">
      <h1 class="text-4xl md:text-5xl font-extrabold text-lime-700">
        🍽️ Food Menu
      </h1>
      <p class="text-gray-600 mt-3">
        Discover our delicious dishes
      </p>
    </div>

    <!-- Food Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">

      {% for item in items %}
      <a href="{% url 'food:detail' item.id %}" class="group">

        <div class="bg-white rounded-2xl overflow-hidden shadow-lg hover:shadow-2xl transition duration-300 transform hover:-translate-y-2">

          <!-- Image -->
          <div class="relative overflow-hidden">
            <img src="{{ item.item_image }}" alt="{{ item.item_name }}" class="w-full h-56 object-cover group-hover:scale-110 transition duration-500">

            <!-- Price Badge -->
            <span class="absolute top-3 right-3 bg-lime-600 text-white px-3 py-1 rounded-full text-sm font-bold shadow">
              ₹
              {{ item.item_price }}
            </span>
          </div>

          <!-- Content -->
          <div class="p-5">

            <h2 class="text-xl font-bold text-gray-800 mb-2 group-hover:text-lime-600 transition">
              {{ item.item_name }}
            </h2>

            <p class="text-gray-600 text-sm leading-relaxed line-clamp-3">
              {{ item.item_description }}
            </p>

            <!-- Button -->
            <div class="mt-5">
              <span class="inline-block bg-lime-100 text-lime-700 px-4 py-2 rounded-lg font-semibold group-hover:bg-lime-600 group-hover:text-white transition">
                View Details →
              </span>
            </div>

          </div>

        </div>

      </a>
      {% endfor %}

    </div>

  </div>
</div>
{% endblock %}
